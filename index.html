    <style>
        :root {
            --bg-start: #efe7dd;
            --bg-end: #f6dbe3;
            --card: rgba(255, 250, 246, 0.92);
            --card-border: rgba(255, 255, 255, 0.65);
            --text: #251819;
            --muted: #7a6160;
            --shadow: 0 24px 60px rgba(111, 72, 79, 0.18);
            --button-shadow: 0 14px 28px rgba(189, 115, 126, 0.22);
            --accent-a: #ff9a7a;
            --accent-b: #ffcf68;
            --accent-c: #f071a3;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255, 208, 110, 0.45), transparent 32%),
                radial-gradient(circle at top right, rgba(244, 164, 189, 0.42), transparent 34%),
                linear-gradient(160deg, var(--bg-start), var(--bg-end));
        }

        .shell {
            width: min(100%, 440px);
            padding: 22px;
            border-radius: 28px;
            background: var(--card);
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .brand {
            display: grid;
            justify-items: center;
            gap: 18px;
            padding: 26px 8px 12px;
            text-align: center;
        }

        .brand-mark {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 34px;
            background: linear-gradient(135deg, var(--accent-c), var(--accent-b));
            box-shadow: 0 14px 28px rgba(240, 113, 163, 0.25);
        }

        h1 {
            margin: 0;
            font-size: clamp(1.9rem, 5vw, 2.4rem);
            line-height: 1.05;
        }

        p {
            margin: 0;
            color: var(--muted);
            font-size: 0.98rem;
        }

        .links {
            margin-top: 20px;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            padding: 16px 18px;
            border: 0;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text);
            background: rgba(255, 255, 255, 0.88);
            box-shadow: var(--button-shadow);
            transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
        }

        .link-card:hover,
        .link-card:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 18px 32px rgba(189, 115, 126, 0.28);
            background: #ffffff;
            outline: none;
        }

        .link-icon {
            flex: 0 0 52px;
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            font-size: 1.45rem;
            background: linear-gradient(135deg, rgba(255, 154, 122, 0.2), rgba(240, 113, 163, 0.24));
        }

        .link-copy {
            display: grid;
            gap: 4px;
            text-align: left;
        }

        .link-title {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .link-subtitle {
            font-size: 0.92rem;
            color: var(--muted);
        }

        .link-arrow {
            margin-left: auto;
            font-size: 1.25rem;
            color: var(--muted);
        }

        .footer {
            margin-top: 18px;
            text-align: center;
            font-size: 0.86rem;
            color: var(--muted);
        }

        @media (max-width: 480px) {
            body {
                padding: 14px;
            }

            .shell {
                padding: 18px;
                border-radius: 24px;
            }

            .link-card {
                padding: 14px 16px;
            }
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var whatsappLink = document.getElementById('whatsapp-link');

            if (!whatsappLink) {
                return;
            }

            whatsappLink.addEventListener('click', function () {
                if (typeof fbq !== 'function') {
                    return;
                }

                fbq('track', 'Contact', {
                    content_name: 'achadinhos da Juh',
                    content_category: 'whatsapp_group',
                    destination: 'https://chat.whatsapp.com/ESpm2po8CsoBCJ2LwIsoks'
                });
            });
        });
    </script>
</head>
<body>
    <noscript>

            alt=""

    </noscript>
    <main class="shell">
        <section class="brand">
            <div class="brand-mark" aria-hidden="true">🛍️</div>
            <div>
                <h1>Achadinhos da Juh</h1>
                <p>Entre no grupo e acompanhe as ofertas selecionadas.</p>
            </div>
        </section>

        <section class="links" aria-label="Links principais">
            <a
                id="whatsapp-link"
                class="link-card"
                href="https://chat.whatsapp.com/ESpm2po8CsoBCJ2LwIsoks"
                target="_blank"
                rel="noreferrer"
            >
                <span class="link-icon" aria-hidden="true">💬</span>
                <span class="link-copy">
                    <span class="link-title">achadinhos da Juh</span>
                    <span class="link-subtitle">Entrar no grupo do WhatsApp</span>
                </span>
                <span class="link-arrow" aria-hidden="true">›</span>
            </a>
        </section>

        <div class="footer">Link direto para o grupo oficial.</div>
    </main>
</body>
</html>
